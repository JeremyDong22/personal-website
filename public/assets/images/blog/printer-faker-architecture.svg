<svg viewBox="0 0 580 420" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
  <!-- Background -->
  <rect width="580" height="420" fill="#0d1117" rx="12"/>

  <!-- POS Terminal -->
  <rect x="210" y="16" width="160" height="38" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1.2"/>
  <text x="290" y="39" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">POS Terminal</text>

  <!-- Arrow down from POS to box -->
  <line x1="290" y1="54" x2="290" y2="80" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="285,76 290,86 295,76" fill="#484f58"/>
  <text x="296" y="71" fill="#6e7681" font-size="10">TCP :9100 (ESC/POS)</text>

  <!-- Main service box -->
  <rect x="30" y="90" width="520" height="190" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="290" y="112" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700" letter-spacing="0.5">printer_api_service</text>

  <!-- ESC/POS Parser box -->
  <rect x="55" y="122" width="160" height="44" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1.2"/>
  <text x="135" y="140" text-anchor="middle" fill="#e6edf3" font-size="11">ESC/POS</text>
  <text x="135" y="157" text-anchor="middle" fill="#e6edf3" font-size="11">Parser</text>

  <!-- Arrow parser → store -->
  <line x1="215" y1="144" x2="255" y2="144" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="251,139 261,144 251,149" fill="#484f58"/>

  <!-- SQLite + RAM Receipt Store box -->
  <rect x="260" y="122" width="155" height="44" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1.2"/>
  <text x="337" y="140" text-anchor="middle" fill="#e6edf3" font-size="11">SQLite + RAM</text>
  <text x="337" y="157" text-anchor="middle" fill="#e6edf3" font-size="11">Receipt Store</text>

  <!-- Arrow store → Flask -->
  <line x1="337" y1="166" x2="337" y2="192" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="332,188 337,198 342,188" fill="#484f58"/>

  <!-- Flask REST API box -->
  <rect x="90" y="197" width="400" height="62" rx="6" fill="#1c2128" stroke="#238636" stroke-width="1.2"/>
  <text x="290" y="218" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Flask REST API  :5000</text>
  <text x="290" y="237" text-anchor="middle" fill="#8b949e" font-size="10">/api/health   /api/recent   /api/receipts   /api/stream (SSE)</text>
  <text x="290" y="251" text-anchor="middle" fill="#8b949e" font-size="10">auth · rate-limit · SSE streaming</text>

  <!-- Arrow down from main box -->
  <line x1="290" y1="280" x2="290" y2="306" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="285,302 290,312 295,302" fill="#484f58"/>
  <text x="320" y="298" fill="#6e7681" font-size="10">Cloudflare Tunnel</text>

  <!-- Tunnel URL box -->
  <rect x="130" y="312" width="320" height="32" rx="6" fill="#161b22" stroke="#6e40c9" stroke-width="1.2"/>
  <text x="290" y="332" text-anchor="middle" fill="#a5a0ff" font-size="11">https://&lt;tunnel&gt;.trycloudflare.com</text>

  <!-- Arrows to Supabase and Dashboard -->
  <line x1="210" y1="344" x2="120" y2="378" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="124,372 116,382 128,380" fill="#484f58"/>
  <line x1="370" y1="344" x2="460" y2="378" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="456,372 464,382 452,380" fill="#484f58"/>

  <!-- Supabase box -->
  <rect x="36" y="380" width="140" height="32" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="1.2"/>
  <text x="106" y="400" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Supabase DB</text>

  <!-- Dashboard box -->
  <rect x="404" y="380" width="140" height="32" rx="6" fill="#1c2128" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="474" y="400" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Kitchen Dashboard</text>
</svg>
