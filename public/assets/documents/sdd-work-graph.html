<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f1117;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* Responsive viewport container */
#viewport {
  width: 100vw;
  height: calc(100vh - 70px);
  overflow: auto;
}

/* Outer sizer: takes the scaled dimensions, auto-centers with margin */
#canvas-sizer {
  margin: 0 auto;
}

#canvas-wrapper {
  position: relative;
  width: 1800px;
  min-height: 2200px;
  padding: 30px 0 80px 0;

}

/* Zoom controls */
.zoom-controls {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 6px;
  z-index: 100;
  background: #1a1d28;
  border: 1px solid #2a2d38;
  border-radius: 10px;
  padding: 6px 10px;
  align-items: center;
}
.zoom-controls button {
  background: #2a2d38;
  border: none;
  color: #ccc;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.zoom-controls button:hover { background: #3a3d48; color: #fff; }
.zoom-level {
  font-size: 12px;
  color: #888;
  min-width: 40px;
  text-align: center;
}

.page-title {
  text-align: center;
  font-size: 26px;

}
.page-subtitle {
  text-align: center;
  font-size: 13px;

  margin-bottom: 20px;
}

#svg-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* Zone boxes */
.zone-box {
  position: absolute;
  border-radius: 14px;
  z-index: 0;
}
.zone-box .zone-title {
  position: absolute;
  top: -12px;
  left: 20px;
  font-size: 12px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 6px;
  background: #0f1117;
}

/* Nodes */
.node {
  position: absolute;
  width: 180px;
  min-height: 52px;
  background: #1a1d28;
  border-radius: 10px;
  border: 1px solid #2a2d38;
  cursor: pointer;
  z-index: 2;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px 12px 10px 16px;
  user-select: none;
}
.node:hover {
  transform: translateY(-3px);
  border-color: #555;
}
.node::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  border-radius: 2px;
}
.node.c-purple::before { background: #6c5ce7; }
.node.c-blue::before   { background: #0984e3; }
.node.c-green::before  { background: #00b894; }
.node.c-yellow::before { background: #fdcb6e; }
.node.c-orange::before { background: #e17055; }
.node.c-pink::before   { background: #fd79a8; }
.node.c-cyan::before   { background: #55efc4; }
.node.c-lavender::before { background: #a29bfe; }

.node .node-label {
  font-size: 13px;
  font-weight: 600;
  color: #eee;
  line-height: 1.35;
  white-space: pre-line;
}
.node .node-sub {
  font-size: 10.5px;
  color: #777;
  margin-top: 3px;
  line-height: 1.3;
}

.node.has-prompt {
  box-shadow: 0 0 12px 2px rgba(253,203,110,0.25);
}
.node.has-prompt:hover {
  box-shadow: 0 0 20px 4px rgba(253,203,110,0.4);
}
.prompt-badge {
  position: absolute;
  top: -8px; right: -6px;
  font-size: 10px;
  background: linear-gradient(135deg, #fdcb6e, #e17055);
  color: #1a1d28;
  padding: 1px 7px;
  border-radius: 8px;
  font-weight: 700;
  white-space: nowrap;
  z-index: 3;
}

.node.wide { width: 400px; }

/* Column headers */
.col-header {
  position: absolute;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  z-index: 2;
  padding: 4px 14px;
  border-radius: 6px;
  background: rgba(26,29,40,0.8);
  border: 1px solid #2a2d38;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  width: 80vw;
  max-width: 900px;
  max-height: 80vh;
  background: #1a1d28;
  border: 1px solid #333;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid #2a2d38;
  flex-shrink: 0;
}
.modal-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}
.modal-header .modal-meta {
  font-size: 12px;
  color: #888;
  margin-top: 2px;
}
.modal-close {
  background: none; border: none;
  color: #888; font-size: 24px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.15s;
}
.modal-close:hover { background: #2a2d38; color: #fff; }
.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
}
.modal-body .desc-block {
  font-size: 14px;
  color: #ccc;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.modal-body .prompt-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid #2a2d38;
}
.modal-body .prompt-section h3 {
  font-size: 14px;
  color: #fdcb6e;
  margin-bottom: 10px;
}
.modal-body .prompt-section .prompt-meta {
  font-size: 12px;
  color: #888;
  margin-bottom: 8px;
}
.modal-body .prompt-content {
  background: #12141c;
  border: 1px solid #2a2d38;
  border-radius: 8px;
  padding: 16px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12.5px;
  color: #bbb;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
}

/* Legend */
.legend {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  z-index: 50;
  background: rgba(19, 21, 29, 0.95);
  border: 1px solid #2a2d38;
  border-radius: 10px;
  padding: 10px 20px;
  max-width: calc(100vw - 200px);
  backdrop-filter: blur(8px);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: #999;
}
.legend-color {
  width: 14px; height: 14px;
  border-radius: 3px;
}
.legend-line {
  width: 30px; height: 0;
}
.legend-line.l-solid { border-top: 2px solid; }
.legend-line.l-dashed { border-top: 2px dashed; }
.legend-line.l-dotted { border-top: 2px dotted; }

/* Edge hover dim/highlight */
#svg-overlay.hovering .edge-path { opacity: 0.08; }
#svg-overlay.hovering .edge-path.highlighted { opacity: 1; stroke-width: 2.5 !important; }

/* Mobile responsive — collapse legend and zoom controls to avoid blocking content */
@media (max-width: 768px) {
  .legend {
    position: relative;
    bottom: auto;
    left: auto;
    transform: none;
    max-width: 100%;
    margin: 12px auto;
    padding: 8px 12px;
    gap: 10px;
    font-size: 10px;
    z-index: 10;
  }
  .legend-item { gap: 4px; font-size: 10px; }
  .legend-color { width: 10px; height: 10px; }
  .legend-line { width: 20px; }

  .zoom-controls {
    position: fixed;
    bottom: 8px;
    right: 8px;
    padding: 4px;
    gap: 4px;
  }
  .zoom-controls button { width: 28px; height: 28px; font-size: 14px; }
  .zoom-level { font-size: 10px; min-width: 30px; }
}
</style>

<script>
(function() {
'use strict';

// ============================================================
// Data definitions
// ============================================================

var nodes = [
  // --- 桌访录音流 (左列 x~350) ---
  { id:'V1', label:'选桌号 + 开始录音', x:310, y:100, color:'purple',
    desc:'【作用】店长在桌访页面选择桌号，点击开始录音。\n【为什么在这】这是桌访数据采集的起点，店长主动发起桌访对话录音。\n【技术】useAudioRecorder Hook，MediaRecorder API\n【支持格式】webm/opus \u2192 webm \u2192 mp4 \u2192 ogg (依次回退)\n【特性】暂停/恢复、波形可视化、屏幕唤醒锁(防息屏)、中断恢复\n【输出】audioBlob + duration + table_id' },

  { id:'V2', label:'音频上传', sub:'POST /api/audio/upload', x:310, y:240, color:'purple',
    desc:'【作用】将录音文件上传到 Supabase Storage，并创建桌访记录。\n【为什么在这】录音完成后需要持久化存储，同时在数据库中建立这条桌访的追踪记录。\n【接口】POST /api/audio/upload (multipart/form-data)\n【输入】file + table_id + restaurant_id + recording_id + employee_id + duration_seconds\n【输出】audio_url + visit_record.id\n【写入DB】lingtin_visit_records (status=pending)' },

  { id:'V3', label:'DashScope STT 转写', sub:'桌访 120s / 会议 300s / Fallback \u2192 讯飞', x:480, y:400, color:'blue', wide:true,
    desc:'【作用】将音频转为文字，是整个分析链的基础。\n【为什么在这】语音数据必须先转为文本才能进行后续AI分析。\n【共享】桌访和会议共用同一个STT服务(dashscope-stt.service.ts)，但参数不同。\n【模型】阿里 DashScope Paraformer-v2（异步批处理API）\n【说话人分离】\u2705 识别"说话人1/说话人2"标签，区分店长和顾客\n【热词增强】通过 DASHSCOPE_VOCABULARY_ID 加权识别菜品名\n【轮询策略】指数退避 1s\u21922s\u21924s...\u219210s max\n【桌访超时】120秒 / 【会议超时】300秒\n【回退】失败时自动切换到讯飞 iFlytek STT（无说话人分离）\n【输出】{ transcript, sttModel, diarizationStatus }' },

  { id:'V4', label:'文本清洗 cleanTranscriptWithAI()', sub:'DeepSeek V3 LLM清洗 / fallback→原文', x:310, y:560, color:'yellow', hasPrompt:true, prompt:'visit_clean',
    desc:'【作用】调用 DeepSeek Chat V3 对原始 STT 文本进行语义清洗，生成流畅自然的中文对话记录。\n【为什么在这】硬编码 regex 无法处理：有说话人标签时几乎跳过清洗、字级别 stutter（那那个/亮亮点）、语义填充词（然后呢/就是那个）、同音误识修正。LLM 理解上下文，覆盖所有边界情况。\n【逻辑】\n- 若 OPENROUTER_API_KEY 未配置 → 直接返回原始文本（fallback）\n- 调用 OpenRouter API，模型 deepseek/deepseek-chat-v3-0324，AbortSignal.timeout(30000)\n- System prompt 指定 6 条清洗规则（见【Prompt】）\n- 若 API 调用抛出任何异常 / 返回空内容 → log warning，return raw（非阻断 fallback）\n- 清洗结果仅在内存中使用，作为 AI 分析的输入\n- 清洗后文本最终写入 DB 的 corrected_transcript 字段（供前端展示）\n【输入】raw_transcript: string（DashScope/讯飞 STT 原始输出）\n【输出】cleanedTranscript: string（清洗后文本，传给 processWithGemini）；同时最终落库到 corrected_transcript\n【模型】deepseek/deepseek-chat-v3-0324，via OpenRouter，timeout 30s' },

  { id:'V5', label:'AI 桌访分析', sub:'DeepSeek V3 / temp=0', x:310, y:720, color:'yellow', hasPrompt:true, prompt:'visit_analysis',
    desc:'【作用】核心AI分析步骤：从对话文本中提取结构化的顾客反馈、满意度、画像信息。\n【为什么在这】清洗后的文本需要被"理解"，提取出业务可用的结构化数据\u2014\u2014这是整个产品价值的核心。\n【模型】deepseek/deepseek-chat-v3-0324 via OpenRouter\n【参数】temperature=0（完全确定性）, max_tokens=2000\n【知识增强】enrichPrompt() 注入餐厅特定上下文（菜品字典等），可选，不阻塞\n【输入】cleaned transcript + diarizationStatus（来自STT pipeline）+ 餐厅知识上下文\n【输出JSON】aiSummary, feedbacks[], managerQuestions[], customerAnswers[], customerSource, visitFrequency\n【说话人分离逻辑】diarizationStatus=success 时进入严格模式：\n  - 强制要求：managerQuestions 和 customerAnswers 各至少1条，绝不能返回空数组[]\n  - 顾客未明确发言时通过店长复述/确认语推断（如"满意是吧"→推断顾客回应满意），推断内容加括号注明\n  - diarizationStatus≠success 时 managerQuestions/customerAnswers 强制返回[]\n【无回退模型】DeepSeek 失败则整条记录报错' },

  { id:'V6', label:'满意度计算', sub:'加权平均 / negative=1.5x', x:310, y:880, color:'green',
    desc:'【作用】根据AI提取的每条反馈的分数，计算整体满意度。\n【为什么在这】AI输出的是逐条feedback的score，需要聚合为一个整体分数供看板和排序使用。\n【无AI调用】纯数学计算\n【公式】加权平均: \u03a3(score \u00d7 weight) / \u03a3(weight)\n【权重】negative=1.5x（差评影响更大）, positive=1.0x, suggestion=1.0x, neutral=0.8x\n【默认值】无feedbacks时返回60分\n【输入】feedbacks[]\n【输出】sentiment_score (0-100)' },

  { id:'V7', label:'保存分析结果', sub:'\u2192 visit_records + 物化视图刷新', x:310, y:1020, color:'orange',
    desc:'【作用】将AI分析结果写入数据库，标记记录为已处理，并触发物化视图刷新。\n【为什么在这】分析完成后需要持久化，供看板、对话、复盘等下游消费。\n【写入表】lingtin_visit_records\n【写入字段】raw_transcript, corrected_transcript, ai_summary, sentiment_score, feedbacks(JSONB), keywords, manager_questions, customer_answers, customer_source, visit_frequency, stt_model, stt_diarization_status, status=processed, processed_at\n【物化视图刷新】ai_visits, ai_feedbacks（供对话系统安全查询）\n【异步任务】KnowledgeExtractorService 从feedbacks提取业务模式（fire-and-forget，不阻塞）' },

  // --- 会议录音流 (中列 x~810) ---
  { id:'M1', label:'选会议类型 + 开始录音', sub:'6种: 餐前会/复盘/周例会/厨房/跨店/1v1', x:810, y:100, color:'cyan',
    desc:'【作用】店长选择会议类型，开始录制会议音频。\n【为什么在这】会议是团队沟通的关键场景，录音+AI纪要能大幅降低信息丢失。\n【6种会议类型】餐前会 / 每日复盘总结会 / 周例会 / 厨房会议 / 跨门店经营分析会 / 一对一沟通\n【输出】audioBlob + meeting_type + restaurant_id' },

  { id:'M2', label:'音频上传', sub:'\u2192 meeting_records (pending)', x:810, y:240, color:'cyan',
    desc:'【作用】上传会议录音到 Supabase Storage，创建会议记录。\n【为什么在这】同桌访录音，需要持久化+建立追踪记录。\n【写入DB】lingtin_meeting_records (status=pending)' },

  { id:'M3', label:'文本清洗 cleanTranscriptWithAI()', sub:'DeepSeek V3 LLM清洗 / 同6条规则 / fallback→原文', x:810, y:560, color:'yellow', hasPrompt:true, prompt:'visit_clean',
    desc:'【作用】调用 DeepSeek Chat V3 对会议原始 STT 文本进行语义清洗，生成流畅自然的中文对话记录。\n【为什么在这】与桌访相同——LLM 能处理说话人标签、stutter、语义填充词等 regex 无法覆盖的边界情况。\n【与桌访清洗的区别】逻辑完全一致，使用相同 6 条规则和同一个 prompt。会议版通过 PRIMARY_MODEL 常量指定模型（= deepseek/deepseek-chat-v3-0324）。\n【逻辑】\n- 若 OPENROUTER_API_KEY 未配置 → 直接返回原始文本（fallback）\n- 调用 OpenRouter API，模型 deepseek/deepseek-chat-v3-0324，AbortSignal.timeout(30000)\n- System prompt 指定 6 条清洗规则（见【Prompt】，与桌访相同）\n- 若 API 调用抛出任何异常 / 返回空内容 → log warning，return raw（非阻断 fallback）\n【输入】raw_transcript: string（DashScope/讯飞 STT 原始输出）\n【输出】cleanedTranscript: string（清洗后文本，传给 AI 会议分析）\n【模型】deepseek/deepseek-chat-v3-0324（PRIMARY_MODEL 常量），via OpenRouter，timeout 30s' },

\n兜底规则：顾客有实质性回应（不只是"嗯"/"好"）\u2192 必须至少提取1条feedback\n- 顾客说"还行"/"还可以" \u2192 {"text": "整体还可以", "sentiment": "neutral", "score": 52}\n- 顾客被问感受后说"好的/没问题" \u2192 {"text": "用餐体验满意", "sentiment": "positive", "score": 68}\n- 店长问"有什么建议"顾客说"没有" \u2192 {"text": "没有意见", "sentiment": "neutral", "score": 55}\n\n格式要求：\n- 每条包含评价对象+评价词（如"五花趾还挺好吃的"而非单独的"好吃"）\n- 没提到具体菜名时用原文表述如"菜品口感还可以"\n- 多个评价拆分成多条\n- 不要编造原文中没有的内容\n- 不要把同一个评价重复提取多次\n\nsentiment 分类：\n- positive: 满意、赞赏 — "好吃"、"味道不错"、"服务很好"、"挺好的"、"没有不合口味"\n- negative: 不满、批评 — "太咸了"、"上菜慢"、"有点辣"、"菜有点白"、"品种太少"\n- neutral: 模糊、无倾向 — "还行"、"还可以"、"一般"、"跟上次差不多"\n- suggestion: 建议新增或改变（不是对现有的抱怨）\n  口语化识别：\u201cX能不能大一点\u201d、\u201c要是有X就好了\u201d、\u201c下次可以加个X\u201d、\u201c分量再多点就好了\u201d\n  区分：\n  - "分量再多点就好了" \u2192 suggestion（建议改进）\n  - "分量太少了" \u2192 negative（抱怨现状）\n  - "要是能快一点就好了" \u2192 negative（抱怨速度）\n  - "桌子能不能大一点" \u2192 suggestion（建议改善设施）\n\n否定句判断：\n- 回答"辣不辣"\u2192"不辣，挺好的" \u2192 positive\n- 主动说"不辣，没味道" \u2192 negative\n\n### 2. managerQuestions — 店长/服务员的话\n提取问候和询问（不含推销、解释性语句）\n\n### 3. customerAnswers — 顾客的回复\n提取顾客的所有实质性回应\n\n### 4. 空数据处理\n某项为空返回空数组[]，customerSource/visitFrequency 为空返回 null\n\n### 5. customerSource — 顾客来源渠道\n规范化为：美团、大众点评、抖音、小红书、朋友介绍、路过、老顾客、外卖平台、公司附近、住附近\n未提及返回 null，不要推测\n\n### 6. visitFrequency — 来访频次\n- "first": 第一次来（"第1次"、"头一次"、"第一次"）\n- "repeat": 来过几次（"第2次"、"之前来过"、"来过几次"）\n- "regular": 常客（"经常来"、"老顾客"、"每周都来"、"常来"）\n- "unknown": 提到了频次话题但无法判断\n- null: 对话中完全未提及频次\n\n## 参考案例 (5个)\n\n案例1 — 简短正面+来源频次：\n输入："你好打扰一下，菜品口感怎么样？还不错啊，是第几次来？第1次，朋友介绍来的，有什么建议吗？没有，挺好的，祝你们用餐愉快。"\n输出：{"aiSummary":"顾客对菜品满意，朋友介绍首次来","feedbacks":[{"text":"菜品口感还不错","sentiment":"positive","score":72},{"text":"整体挺好的","sentiment":"positive","score":70}],"managerQuestions":["菜品口感怎么样","是第几次来","有什么建议吗"],"customerAnswers":["还不错","第1次，朋友介绍来的","没有，挺好的"],"customerSource":"朋友介绍","visitFrequency":"first"}\n\n案例2 — 有具体不满：\n输入："两位打扰一下，今天菜品怎么样？嗯，那个酸菜鱼有点太辣了不太习惯，还有上菜速度有点慢等了差不多半个小时，其他的都还行，好的我跟厨房反映一下。"\n输出：{"aiSummary":"顾客反馈酸菜鱼太辣、上菜慢","feedbacks":[{"text":"酸菜鱼有点太辣了","sentiment":"negative","score":28},{"text":"上菜速度有点慢","sentiment":"negative","score":25},{"text":"其他菜品还行","sentiment":"neutral","score":52}],"managerQuestions":["今天菜品怎么样"],"customerAnswers":["酸菜鱼有点太辣了不太习惯","上菜速度有点慢等了差不多半个小时","其他的都还行"],"customerSource":null,"visitFrequency":null}\n\n案例3 — 纯寒暄无反馈（无说话人标签时）：\n输入："你好两位新年快乐，菜品有什么意见吗？噢好谢谢你们的肯定，祝用餐愉快。"\n输出：{"aiSummary":"店长问候，顾客未给具体反馈","feedbacks":[],"managerQuestions":["菜品有什么意见吗"],"customerAnswers":[],"customerSource":null,"visitFrequency":null}\n\n案例4 — 顾客点头未发言（有说话人标签）：\n输入："说话人1: 打扰一下，今天的菜品口味还满意吗？说话人2: 说话人1: 满意是吧，好的，祝用餐愉快！"\n输出：{"aiSummary":"顾客对菜品满意（点头确认）","feedbacks":[{"text":"菜品口味满意","sentiment":"positive","score":70}],"managerQuestions":["今天的菜品口味还满意吗"],"customerAnswers":["[顾客点头确认]满意"],"customerSource":null,"visitFrequency":null}\n\n案例5 — 有说话人标签+具体不满：\n输入："说话人1: 打扰一下，今天用餐感觉怎么样？说话人2: 那个鱼有点腥，不太新鲜。说话人1: 好的，我跟后厨反映，非常抱歉，下次请您来我们会特别关注。"\n输出：{"aiSummary":"顾客反馈鱼不新鲜有腥味","feedbacks":[{"text":"鱼有点腥，不太新鲜","sentiment":"negative","score":18}],"managerQuestions":["今天用餐感觉怎么样"],"customerAnswers":["那个鱼有点腥，不太新鲜"],"customerSource":null,"visitFrequency":null}'

  d.className = 'node c-' + n.color + (n.hasPrompt ? ' has-prompt' : '') + (n.wide ? ' wide' : '');
  d.style.left = n.x + 'px';
  d.style.top = n.y + 'px';
  d.dataset.id = n.id;

  var lbl = document.createElement('div');
  lbl.className = 'node-label';
  lbl.textContent = n.label;
  d.appendChild(lbl);

  if (n.sub) {
    var sub = document.createElement('div');
    sub.className = 'node-sub';
    sub.textContent = n.sub;
    d.appendChild(sub);
  }

  if (n.hasPrompt) {
    var badge = document.createElement('div');
    badge.className = 'prompt-badge';
    badge.textContent = '\u2728 Prompt';
    d.appendChild(badge);
  }

  d.addEventListener('click', function() { openModal(n); });
  d.addEventListener('mouseenter', function() { highlightEdges(n.id); });
  d.addEventListener('mouseleave', clearHighlights);

  wrapper.appendChild(d);
  nodeEls[n.id] = d;
});

// Get node bounding rect (relative to canvas)
function rect(id) {
  var el = nodeEls[id];
  if (!el) return null;
  var x = parseInt(el.style.left);
  var y = parseInt(el.style.top);
  var w = el.offsetWidth;
  var h = el.offsetHeight;
  return { x:x, y:y, w:w, h:h, cx:x+w/2, cy:y+h/2, l:x, r:x+w, t:y, b:y+h };
}

// -- Render edges --
function renderEdges() {
  svg.querySelectorAll('.edge-path').forEach(function(p){ p.remove(); });

  edges.forEach(function(e, idx) {
    var fr = rect(e.from);
    var tr = rect(e.to);
    if (!fr || !tr) return;

    var colorMap = { orange:'#e17055', lavender:'#a29bfe', gray:'#555' };
    var arrowMap = { orange:'url(#ao)', lavender:'url(#al)', gray:'url(#ag)' };
    var strokeColor = colorMap[e.color] || '#888';
    var arrow = arrowMap[e.color] || 'url(#aw)';

    var x1, y1, x2, y2, d;

    if (e.feedback) {
      // Feedback loop: H2 bottom curving left and up to V3 left
      x1 = fr.cx;
      y1 = fr.b;
      x2 = tr.l;
      y2 = tr.cy;
      var loopX = 250;
      d = 'M'+x1+','+y1+' C'+x1+','+(y1+100)+' '+loopX+','+(y1+100)+' '+loopX+','+((y1+y2)/2)+' S'+loopX+','+(y2-60)+' '+x2+','+y2;
    } else if (e.color === 'orange') {
      // DB: right of from -> left of to
      x1 = fr.r; y1 = fr.cy;
      x2 = tr.l; y2 = tr.cy;
      var mx = (x1+x2)/2;
      d = 'M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2;
    } else if (e.color === 'lavender') {
      // UI: left of from -> right of to
      x1 = fr.l; y1 = fr.cy;
      x2 = tr.r; y2 = tr.cy;
      var mx = (x1+x2)/2;
      d = 'M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2;
    } else if (e.color === 'gray' && !e.feedback) {
      // Gray dotted downstream
      var dx = tr.cx - fr.cx;
      var dy = tr.cy - fr.cy;
      if (Math.abs(dy) > Math.abs(dx)) {
        x1 = fr.cx; y1 = dy > 0 ? fr.b : fr.t;
        x2 = tr.cx; y2 = dy > 0 ? tr.t : tr.b;
      } else {
        x1 = dx > 0 ? fr.r : fr.l; y1 = fr.cy;
        x2 = dx > 0 ? tr.l : tr.r; y2 = tr.cy;
      }
      var mx = (x1+x2)/2; var my = (y1+y2)/2;
      d = 'M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2;
    } else {
      // Main flow: vertical
      var dx = tr.cx - fr.cx;
      var dy = tr.cy - fr.cy;

      if (Math.abs(dy) >= Math.abs(dx) * 0.5) {
        // Mostly vertical
        x1 = fr.cx; y1 = dy > 0 ? fr.b : fr.t;
        x2 = tr.cx; y2 = dy > 0 ? tr.t : tr.b;
        if (Math.abs(dx) < 20) {
          // Straight vertical
          var my = (y1+y2)/2;
          d = 'M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2;
        } else {
          // Angled vertical
          d = 'M'+x1+','+y1+' C'+x1+','+(y1+(y2-y1)*0.4)+' '+x2+','+(y1+(y2-y1)*0.6)+' '+x2+','+y2;
        }
      } else {
        // Mostly horizontal
        x1 = dx > 0 ? fr.r : fr.l; y1 = fr.cy;
        x2 = dx > 0 ? tr.l : tr.r; y2 = tr.cy;
        var mx = (x1+x2)/2;
        d = 'M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2;
      }
    }

    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', strokeColor);
    path.setAttribute('stroke-width', e.type === 'solid' ? '2' : '1.5');
    path.setAttribute('marker-end', arrow);
    if (e.type === 'dashed') path.setAttribute('stroke-dasharray', '6,4');
    if (e.type === 'dotted') path.setAttribute('stroke-dasharray', '3,3');
    path.classList.add('edge-path');
    path.dataset.from = e.from;
    path.dataset.to = e.to;
    svg.appendChild(path);
  });
}

// -- Edge highlighting --
function highlightEdges(nodeId) {
  svg.classList.add('hovering');
  svg.querySelectorAll('.edge-path').forEach(function(p) {
    if (p.dataset.from === nodeId || p.dataset.to === nodeId) {
      p.classList.add('highlighted');
    }
  });
}
function clearHighlights() {
  svg.classList.remove('hovering');
  svg.querySelectorAll('.edge-path.highlighted').forEach(function(p) { p.classList.remove('highlighted'); });
}

// -- Modal --
function openModal(node) {
  modalTitle.textContent = node.label.replace(/\n/g, ' ');

  var metaHtml = '';
  if (node.hasPrompt && prompts[node.prompt]) {
    var p = prompts[node.prompt];
    metaHtml = p.model + ' &nbsp;|&nbsp; ' + p.params + ' &nbsp;|&nbsp; ' + p.file;
  }
  modalMeta.innerHTML = metaHtml;

  var bodyHtml = '<div class="desc-block">' + esc(node.desc) + '</div>';

  if (node.hasPrompt && prompts[node.prompt]) {
    var p = prompts[node.prompt];
    bodyHtml += '<div class="prompt-section">' +
      '<h3>\u2728 ' + esc(p.title) + '</h3>' +
      '<div class="prompt-meta">' + esc(p.model) + ' | ' + esc(p.params) + ' | ' + esc(p.file) + '</div>' +
      '<div class="prompt-content">' + esc(p.content) + '</div>' +
      '</div>';
  }

  modalBody.innerHTML = bodyHtml;
  modal.classList.add('active');
}

function closeModal() { modal.classList.remove('active'); }

document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

// -- Legend --
var legendData = [
  { t:'color', c:'#6c5ce7', text:'\u524d\u7aef/\u5f55\u97f3' },
  { t:'color', c:'#0984e3', text:'STT' },
  { t:'color', c:'#00b894', text:'\u6e05\u6d17/\u8ba1\u7b97' },
  { t:'color', c:'#fdcb6e', text:'AI \u6a21\u578b\u8c03\u7528' },
  { t:'color', c:'#e17055', text:'DB \u5b58\u50a8' },
  { t:'color', c:'#fd79a8', text:'\u5bf9\u8bdd' },
  { t:'color', c:'#55efc4', text:'\u4f1a\u8bae' },
  { t:'color', c:'#a29bfe', text:'UI \u51fa\u53e3' },
  { t:'line', s:'l-solid', c:'#888', text:'\u4e3b\u7ebf\u6d41\u7a0b' },
  { t:'line', s:'l-dashed', c:'#e17055', text:'\u2192 DB \u5199\u5165' },
  { t:'line', s:'l-dotted', c:'#a29bfe', text:'\u2192 UI \u51fa\u53e3' },
  { t:'line', s:'l-dotted', c:'#555', text:'\u4e0b\u6e38/\u5f02\u6b65' },
];

var legendEl = document.createElement('div');
legendEl.className = 'legend';
legendData.forEach(function(item) {
  var li = document.createElement('div');
  li.className = 'legend-item';
  if (item.t === 'color') {
    var c = document.createElement('div');
    c.className = 'legend-color';
    c.style.background = item.c;
    li.appendChild(c);
  } else {
    var l = document.createElement('div');
    l.className = 'legend-line ' + item.s;
    l.style.borderTopColor = item.c;
    li.appendChild(l);
  }
  var t = document.createElement('span');
  t.textContent = item.text;
  li.appendChild(t);
  legendEl.appendChild(li);
});
document.body.appendChild(legendEl);

// -- Zoom & Pan --
var viewport = document.getElementById('viewport');
var zoomLevelEl = document.getElementById('zoom-level');
var currentScale = 1;
var ZOOM_STEP = 0.1;
var MIN_ZOOM = 0.3;
var MAX_ZOOM = 1.5;

var sizer = document.getElementById('canvas-sizer');

function applyScale(scale) {
  currentScale = scale;
  var nh = parseFloat(wrapper.dataset.naturalHeight || 2200);
  wrapper.style.transform = 'scale(' + scale + ')';
  // Sizer takes the scaled dimensions so margin:auto centers it, and viewport can scroll
  sizer.style.width = Math.ceil(1800 * scale) + 'px';
  sizer.style.height = Math.ceil(nh * scale) + 'px';
  sizer.style.overflow = 'hidden';
  zoomLevelEl.textContent = Math.round(scale * 100) + '%';
}

function setZoom(scale, centerOnViewport) {
  scale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, scale));
  if (centerOnViewport) {
    var vw = viewport.clientWidth;
    var vh = viewport.clientHeight;
    var cx = (viewport.scrollLeft + vw / 2) / currentScale;
    var cy = (viewport.scrollTop + vh / 2) / currentScale;
    applyScale(scale);
    viewport.scrollLeft = cx * scale - vw / 2;
    viewport.scrollTop = cy * scale - vh / 2;
  } else {
    applyScale(scale);
  }
}

function zoomToFit() {
  var vw = viewport.clientWidth;
  var vh = viewport.clientHeight;
  var cw = 1800;
  var ch = parseFloat(wrapper.dataset.naturalHeight || 2200);
  var scale = Math.min(vw / cw, vh / ch, 1);
  setZoom(scale, false);
  viewport.scrollTop = 0;
}

document.getElementById('zoom-in').addEventListener('click', function() { setZoom(currentScale + ZOOM_STEP, true); });
document.getElementById('zoom-out').addEventListener('click', function() { setZoom(currentScale - ZOOM_STEP, true); });
document.getElementById('zoom-fit').addEventListener('click', zoomToFit);

// Ctrl+scroll to zoom
viewport.addEventListener('wheel', function(e) {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
    setZoom(currentScale + delta, true);
  }
}, { passive: false });

// -- Initial render --
requestAnimationFrame(function() {
  var maxB = 0;
  nodes.forEach(function(n) {
    var el = nodeEls[n.id];
    var b = n.y + (el ? el.offsetHeight : 80);
    if (b > maxB) maxB = b;
  });
  var naturalH = maxB + 140;
  wrapper.dataset.naturalHeight = naturalH;
  wrapper.style.minHeight = naturalH + 'px';
  svg.style.width = '1800px';
  svg.style.height = naturalH + 'px';
  svg.setAttribute('viewBox', '0 0 1800 ' + naturalH);
  renderEdges();

  // Auto fit to screen on load
  zoomToFit();
});

})();
</script>
